services:

  app:
    image: nginx:latest
    volumes:
      - ./:/var/www
      - ./.docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
     - "80:80"
    environment:
      - NGINX_HOST=${APP_URL}



  php:
    build:
        context: .
        dockerfile: ./.docker/Dockerfile

    environment:
      - DB_HOST=mysql
    volumes:
        - ./:/var/www
    working_dir: /var/www

  mysql:
    image: mysql:8.0
    ports:
    - '${DB_PORT:-3306}:3306'
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_DATABASE: ${DB_DATABASE}




  redis:
    image: redis:alpine




networks:
  laravel-development:



volumes:
  mysql-data-development:

